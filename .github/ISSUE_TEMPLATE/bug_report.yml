name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, userscript manager, script version, OS.
      placeholder: |
        Browser:
        Userscript manager:
        Script version:
        OS:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Console output
      description: Remove tokens, cookies, credentials, and private URLs.
      render: text
